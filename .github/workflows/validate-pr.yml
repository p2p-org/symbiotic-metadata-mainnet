name: Validate Pull Request

on:
  pull_request_target:
    branches:
      - main

jobs:
  validate-pr:
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    permissions:
      pull-requests: write

    steps:

      - name: Detect changed files
        uses: yumemi-inc/changed-files@v3
        id: changes

      - name: Checkout repository
        uses: actions/checkout@11d5960a326750d5838078e36cf38b85af677262 # v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Validate
        uses: symbioticfi/metadata-validation-scripts@e3824a8ec94aa353bb4f5828f490688e84f51721 # main
        with:
          files: ${{ steps.changes.outputs.files }}
          issue: ${{ github.event.number }}
          token: ${{ secrets.GITHUB_TOKEN }}
          chain-id: 1
          network-registry: "0xc773b1011461e7314cf05f97d95aa8e92c1fd8aa"
          operator-registry: "0xad817a6bc954f678451a71363f04150fdd81af9f"
          vault-registry: "0xaeb6bdd95c502390db8f52c8909f703e9af6a346"
